<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gestión de turnos para cabinas. Asigna y libera cabinas de forma eficiente y visual.">
    <title>Gestión de Cabinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Panel de Cabinas</h1>
            </div>
            <div class="stats">
                <div class="stat-badge available">
                    <span class="stat-dot"></span>
                    <span id="available-count">10</span> Disponibles
                </div>
                <div class="stat-badge occupied">
                    <span class="stat-dot"></span>
                    <span id="occupied-count">0</span> Ocupadas
                </div>
                <div class="stat-badge maintenance">
                    <span class="stat-dot"></span>
                    <span id="maintenance-count">0</span> Pausadas
                </div>
            </div>
        </header>

        <main class="grid-container" id="cabins-grid">
            <!-- Las cabinas se generarán dinámicamente con JavaScript -->
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
